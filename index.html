<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Монитор группы</title>

<style>
    body{
        margin:0;
        font-family: Arial, sans-serif;
        background:#ececec;
        display:flex;
        justify-content:center;
        padding:30px;
    }

    .container{
        width:320px;
    }

    .card{
        background:white;
        border-radius:10px;
        padding:18px;
        margin-bottom:15px;
        box-shadow:0 2px 5px rgba(0,0,0,0.1);
    }

    h3{
        margin-top:0;
        font-size:22px;
    }

    .subtitle{
        color:#555;
        font-size:14px;
        margin-bottom:15px;
    }

    .buttons{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:8px;
    }

    button{
        border:none;
        border-radius:5px;
        padding:12px;
        font-size:14px;
        color:white;
        cursor:pointer;
        font-weight:bold;
    }

    .study{
        background:#28a745;
    }

    .coffee{
        background:#f0b400;
        color:black;
    }

    .game{
        background:#17a2b8;
    }

    .home{
        background:#6c757d;
    }

    .user-item{
        display:flex;
        align-items:center;
        gap:10px;
        margin-top:15px;
    }

    .status-dot{
        width:12px;
        height:12px;
        border-radius:50%;
    }

    .user-name{
        font-weight:bold;
    }

    .user-status{
        color:#777;
        font-size:13px;
    }
</style>
</head>

<body>

<div class="container">

    <!-- Профиль -->
    <div class="card">
        <h3>Мой профиль</h3>

        <div class="subtitle" id="myInfo">
            Загрузка...
        </div>

        <div class="buttons">
            <button class="study"
                onclick="changeStatus('📚 Учусь', '#28a745')">
                📚 Учусь
            </button>

            <button class="coffee"
                onclick="changeStatus('☕ Кофе-брейк', '#f0b400')">
                ☕ Кофе
            </button>

            <button class="game"
                onclick="changeStatus('🎮 В игре', '#17a2b8')">
                🎮 В игре
            </button>

            <button class="home"
                onclick="changeStatus('🏠 Дома', '#6c757d')">
                🏠 Дома
            </button>
        </div>
    </div>

    <!-- Монитор группы -->
    <div class="card">
        <h3>Монитор группы</h3>

        <div id="groupList"></div>
    </div>

</div>

<!-- SUPABASE -->
<script type="module">

import { createClient }
from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const URL = 'https://kvjbedcqrsahohactbmc.supabase.co';

const KEY =
'sb_publishable_4NSVdmyppY5gbYjqbrAnHA_WdRjtcBG';

const supabase = createClient(URL, KEY);

const MY_ID =
'65bd1c0f-3ef6-496b-8a00-3b0b14a54509';


// Изменение статуса
window.changeStatus = async (text, color) => {

    const { error } = await supabase
        .from('profiles')
        .update({
            status: text,
            color: color
        })
        .eq('id', MY_ID);

    if (error) {

        alert('Ошибка! Проверьте RLS политики.');
        console.error(error);

    } else {

        fetchGroup();

    }
};


// Получение списка пользователей
async function fetchGroup() {

    const { data, error } = await supabase
        .from('profiles')
        .select('*')
        .order('username', { ascending:true });

    if(error)
        return console.error(error);

    const list =
        document.getElementById('groupList');

    list.innerHTML = data.map(user => `

        <div class="user-item">

            <div class="status-dot"
                style="background:${user.color || '#ccc'}">
            </div>

            <div>
                <div class="user-name">
                    ${user.username}
                </div>

                <div class="user-status">
                    ${user.status || 'Статус не указан'}
                </div>
            </div>

        </div>

    `).join('');



    // Информация о себе
    const me = data.find(u => u.id == MY_ID);

    if(me){

        document.getElementById('myInfo')
            .innerText =
            `Вы зашли как: ${me.username}`;

    }

}


// Первый запуск
fetchGroup();


// Автообновление каждые 5 сек
setInterval(fetchGroup, 5000);

</script>

</body>
</html>
